    url: ${FRONTEND_URL:http://localhost:5173}
  email:
    enabled: ${EMAIL_ENABLED:true}

server:
  port: 8080


# TMS Scheduler Configuration
tms:
  scheduler:
    enabled: true
    jobs:
      # Job 1: Class Status Update (SCHEDULED -> ONGOING, ONGOING -> COMPLETED)
      class-status-update:
        enabled: true
        cron: "0 30 0 * * ?"  # Daily at 12:30 AM

      # Job 2: Transfer Request Execution (execute approved TRANSFER requests)
      transfer-request-execution:
        enabled: true
        cron: "0 0 2 * * ?"  # Daily at 2:00 AM

      # Job 3: Request Expiry (auto-expire old PENDING requests)
      request-expiry:
        enabled: true
        cron: "0 0 3 * * ?"  # Daily at 3:00 AM
        expiry-days: 7  # Expire after 7 days

      # Job 4: License Expiry Warning (monitor VIRTUAL resource licenses)
      license-expiry-warning:
        enabled: true
        cron: "0 0 8 * * ?"  # Daily at 8:00 AM
        warning-days: 30  # First warning at 30 days
        urgent-days: 7    # Urgent warning at 7 days

      # Job 5: Course Activation (DRAFT + APPROVED -> ACTIVE on effectiveDate)
      course-activation:
        enabled: true
        cron: "0 0 1 * * ?"  # Daily at 1:00 AM

      # ========== PHASE 2 JOBS ==========

      # Job 6: Enrollment Status Update (auto-complete enrollments for completed classes)
      enrollment-status-update:
        enabled: true
        cron: "0 0 1 * * ?"  # Daily at 1:00 AM (after CourseActivationJob)

      # Job 7: Pending Request Reminder (remind Academic Affairs about old pending requests)
      pending-request-reminder:
        enabled: true
        cron: "0 0 9 * * MON-FRI"  # Weekdays at 9:00 AM
        reminder-threshold-days: 3  # Remind about requests pending 3+ days

      # Job 8: Weekly Attendance Report (generate attendance reports and alerts)
      weekly-attendance-report:
        enabled: true
        cron: "0 0 18 * * SUN"  # Sundays at 6:00 PM
        low-attendance-threshold: 75.0  # Alert students with attendance below 75%

      # Job 10: Feedback Collection Reminder (remind students to provide feedback)
      feedback-collection-reminder:
        enabled: true
        cron: "0 0 10 * * MON,WED,FRI"  # Mon/Wed/Fri at 10:00 AM

